services:
  api:
    command: ["uvicorn", "aipacken.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/aipacken"]
    volumes:
      - ../../apps/api:/app
    environment:
      PLATFORM_ENV: dev

  # Base compose splits the worker pool into fast/slow queues
  # (see jobs/worker.py). Both services need the hot-reload override
  # and the bind-mount — a single `worker:` override targeted the
  # legacy WorkerSettings class and silently created an orphan
  # container that was not defined in the base stack, so ML jobs
  # enqueued to SLOW_QUEUE never ran under `make dev`.
  worker-fast:
    command: ["watchfiles", "--filter", "python", "arq aipacken.jobs.worker.FastWorkerSettings", "/app/aipacken"]
    volumes:
      - ../../apps/api:/app
    environment:
      PLATFORM_ENV: dev

  worker-slow:
    command: ["watchfiles", "--filter", "python", "arq aipacken.jobs.worker.SlowWorkerSettings", "/app/aipacken"]
    volumes:
      - ../../apps/api:/app
    environment:
      PLATFORM_ENV: dev

  builder:
    command: ["uvicorn", "aipacken.docker_client.builder_app:app", "--host", "0.0.0.0", "--port", "8080", "--reload", "--reload-dir", "/app/aipacken"]
    volumes:
      - ../../apps/api:/app
    environment:
      PLATFORM_ENV: dev

  frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: dev
    command: ["pnpm", "dev", "--host", "0.0.0.0", "--port", "80"]
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
    # Base compose caps memory at 128M for the prod nginx target. Vite +
    # esbuild need far more — OOM-kills the esbuild child with the cryptic
    # "Error: The service was stopped".
    # Prod healthcheck looks for /var/run/nginx.pid — never exists in
    # the Vite dev target, so the container is forever "unhealthy".
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:80/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
